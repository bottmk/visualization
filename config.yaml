# BSDF シミュレーション設定ファイルサンプル
# 物理単位はすべて μm（マイクロメートル）に統一
# プリセット値は null を指定すると適用される。数値を指定するとプリセットより優先される。

# ── 光学条件 ─────────────────────────────────────────────────────────────────
simulation:
  # wavelength_um / theta_i_deg / mode はスカラ（1 条件）または list（多条件）を受理。
  # list を指定すると直積展開で 1 run 内に全条件の BSDF が計算される。
  wavelength_um: 0.55           # 波長 [μm]（例: 0.55 または [0.465, 0.525, 0.630]）
  theta_i_deg: 0.0              # 入射天頂角 [deg]（<90°=BRDF、>90°=BTDF、=90°はエラー）
  # mode: 'BRDF'                # 省略時は theta_i_deg から自動判定
  phi_i_deg: 0.0                # 入射方位角 [deg]
  n1: 1.0                       # 入射側媒質の屈折率（空気=1.0）
  n2: 1.5                       # 透過側媒質の屈折率（ガラス=1.5）
  polarization: 'Unpolarized'   # 'S' / 'P' / 'Unpolarized'

# ── 表面形状モデル ─────────────────────────────────────────────────────────────
surface:
  model: 'RandomRoughSurface'   # 'RandomRoughSurface' / 'SphericalArraySurface' / 'MeasuredSurface'
  grid_size: 4096               # 本計算用グリッドサイズ（デフォルト: 4096）
  pixel_size_um: 0.25           # ピクセルサイズ [μm]（物理サイズ = grid_size × pixel_size_um）

  # RandomRoughSurface パラメータ
  random_rough:
    rq_um: 0.005                # RMS粗さ [μm]（例: 5nm = 0.005μm）
    lc_um: 2.0                  # 相関長 [μm]
    fractal_dim: 2.5            # フラクタル次元（2.0〜3.0）

  # SphericalArraySurface パラメータ
  spherical_array:
    radius_um: 50.0             # 曲率半径 [μm]
    base_height_um: 0.0         # ベース高さ [μm]
    placement: 'Hexagonal'      # 'Grid' / 'Hexagonal' / 'Random' / 'PoissonDisk'
    pitch_um: 50.0              # 配置ピッチ [μm]（Grid/Hexagonal用）
    overlap_mode: 'Maximum'     # 'Maximum'（Max値採用） / 'Additive'（加算）

  # MeasuredSurface パラメータ
  measured:
    file_path: 'data/surface.csv'  # 実測高さデータのファイルパス
    # ローダー仕様は実ファイル提供後に追記

# ── 多層BSDF合成（Adding-Doubling）───────────────────────────────────────────
adding_doubling:
  enabled: false                # true にすると多層合成を実行
  precision: 'standard'         # 'fast' / 'standard' / 'high'
  n_theta: null                 # null のときはプリセット値を使用
  m_phi: null                   # null のときはプリセット値を使用
  # プリセット: fast=(32,8) / standard=(128,18) / high=(256,36)

  layers:
    - type: 'surface'           # 表面AG凹凸層（FFT/PSD法のBSDFを使用）
    - type: 'bulk'              # 内部ヘイズ層
      hg_g: 0.8                 # Henyey-Greenstein 非対称パラメータ
      scattering_coeff: 0.1     # 散乱係数 [μm⁻¹]
      thickness_um: 100.0       # 層厚 [μm]
    - type: 'surface'           # 裏面平滑層

# ── PSD法オプション ───────────────────────────────────────────────────────────
psd:
  approx_mode: false            # false=完全形（Elson-Bennett）/ true=簡略形（Stover、高速）

# ── FFT法オプション ───────────────────────────────────────────────────────────
# fft.mode: 'tilt' (既定) / 'output_shift' / 'zero'
#   - tilt:         入力に位相傾き項を加え specular を正しい (u,v) に配置。
#                   全半球カバーだが sin(θ_i)·N·dx/λ が非整数で漏れが出る。
#   - output_shift: 出力 u_grid のラベルだけシフト。漏れなし、前方散乱の精度高。
#                   θ_i が大きいと後方散乱側が格子範囲から外れて欠損する。
#                   条件: dx ≤ λ/(2·(1 + |sin θ_i|))
#   - zero:         垂直入射近似（cos θ_i=1, sin θ_i=0）。θ_i 非依存で 1 回計算。
#                   specular は常に (0,0)。パターン形状のみ必要な用途・最速計算用。
# 詳細は docs/fft_bsdf_math.md 参照。
fft:
  mode: 'tilt'

# ── 誤差計算 ──────────────────────────────────────────────────────────────────
error_metrics:
  bsdf_floor: 1.0e-6            # sr⁻¹ 装置のノイズフロアに合わせて変更

# ── 評価指標 ──────────────────────────────────────────────────────────────────
metrics:
  # Haze/Gloss/DOI は規格（JIS K 7136 / ISO 2813 / JIS K 7374 / ASTM E430 等）が
  # CIE 白色光源 + V(λ) 明所視応答で規定されているため、本実装は代表波長 1 つでの
  # 単波長近似を採用。各指標の「規格 θ_i, mode」に対応する BSDF は自動追加 sim で
  # 計算される。メトリクス命名は <name>_<method>_<deg>_<mode>（波長依存メトリクス
  # は <name>_<method>_<nm>_<deg>_<mode>）。詳細は spec_main.md 5.3/5.4 節参照。
  representative_wavelength_um: 0.555   # 省略時のデフォルト（V(λ) ピーク付近）

  # 斜入射対応値（sim の (θ_i, mode) で各指標を評価、規格値と別メトリクスとして出力）
  compute_at_sim_angles: false  # 規格外条件での計算をオン/オフ

  haze:
    enabled: true
    half_angle_deg: 2.5         # ヘイズ境界角 [deg]（規格 2.5°）
    # 規格条件: θ_i=0°, BTDF → メトリクス: haze_fft_0_t

  gloss:
    enabled: true
    enabled_angles: [20, 60, 85]          # 規格 3 角 (ISO 2813 / ASTM D523)
    black_glass_normalization: false      # true: 黒ガラス (n=1.567) 基準で 0〜100 GU
    black_glass_n: 1.567                  # 黒ガラス屈折率（規格値固定推奨）
    # 規格条件: θ_i=(20|60|85), BRDF → メトリクス: gloss_fft_<deg>_r

  # DOI (写像性) は 3 方式を並列で提供。どれを使うかは用途で選択:
  #   doi_nser : スペキュラー近傍エネルギー比 (独自・規格非準拠、最適化向き)
  #   doi_comb : JIS K 7374 光学くし方式 (通称「くしば方式」、人間視覚との相関が高い)
  #   doi_astm : ASTM E430 Dorigon 方式 (0°/0.3° 反射率差分比)
  # 値域は 3 方式とも 0〜1 で統一。規格値 [%] が必要なら呼び出し側で ×100。

  doi_nser:
    enabled: true
    direct_half_angle_deg: 0.1  # 直進光コーン半角 [deg]
    halo_half_angle_deg: 2.0    # ハロー領域半角 [deg]
    # 規格条件: θ_i=0°, BTDF → メトリクス: doi_nser_fft_0_t

  doi_comb:
    enabled: true
    enabled_modes: [t, r]       # 計算する mode（t=BTDF, r=BRDF）
    comb_widths_mm: [0.125, 0.25, 0.5, 1.0, 2.0]  # JIS K 7374 標準くし幅
    distance_mm: 280.0          # 試料〜くし距離 [mm] (Suga ICM 標準)
    scan_half_angle_deg: 4.0    # 走査評価範囲の半角 [deg]
    v_band_half_deg: 0.2        # 1D プロファイル抽出時の v 軸バンド半角 [deg]
    # 規格条件: θ_i=0°, 各 mode → メトリクス: doi_comb_fft_0_t / doi_comb_fft_0_r

  doi_astm:
    enabled: true
    enabled_angles: [20, 30]    # ASTM E430 標準 (塗装: 20°, 高光沢: 30°)
    offset_deg: 0.3             # ASTM E430 標準オフセット [deg]
    aperture_half_deg: 0.05     # 受光絞りの半角 [deg]
    # 規格条件: θ_i=(20|30), BRDF → メトリクス: doi_astm_fft_<deg>_r
  sparkle:
    enabled: true
    level: 'L1'                 # 'L1' / 'L3' / 'L4' / 'L5'
                                # L1: 既存実装（全面一様・単波長・角度ビニング）
                                # L3: 単色表示（サブピクセル + 単波長、要 color 指定）
                                # L4: 白点灯（R/G/B 3 色合成、V(λ) 重み、narrowband 近似）
                                # L5: 空間分解 BSDF（窓付き FFT、要 color 指定、最も物理的）
                                # 詳細: docs/sparkle_approximation_levels.md
    color: 'G'                  # L3/L5 用の点灯色 'R' / 'G' / 'B'（L1/L4 では無視）
    # 実測校正（raw Cs が実測値と桁で乖離するため、スケール/多項式で補正可能）
    calibration:
      mode: null                # 'scale' / 'polynomial' / null (既定、校正なし)
      # scale: 0.05             # mode='scale' 時: cs_cal = scale × cs_sim
      # polynomial: [0.05, 1.0, 0.0]  # mode='polynomial' 時: cs_cal = a × cs_sim^b + c
      # 校正係数の求め方: docs/sparkle_calibration.md 参照
    viewing:
      preset: 'smartphone'      # 'smartphone' / 'tablet' / 'monitor' / 'custom'
      distance_mm: null         # null のときはプリセット値（300mm）
      pupil_diameter_mm: null   # null のときはプリセット値（3mm）
    display:
      preset: 'fhd_smartphone'  # 'fhd_smartphone' / 'qhd_monitor' / '4k_monitor' / 'custom'
      pixel_pitch_mm: null      # null のときはプリセット値（0.062mm）
      subpixel_layout: null     # null のときはプリセット値（'rgb_stripe'）
    # 多波長は simulation.wavelength_um を list で指定する（波長ごとに独立計算）。
    # メトリクスキー: sparkle_<level>_<method>_<nm>_<deg>_<mode>
    # 例: sparkle_l1_fft_525_0_t（L1、525 nm、θ_i=0、BTDF）

# ── 可視化オプション ─────────────────────────────────────────────────────────
visualization:
  # BSDF 2D ヒートマップへの光学指標オーバーレイ（Haze/Gloss/DOI-NSER/COMB/ASTM）
  # HoloViews+Bokeh 構成で凡例クリックによる表示/非表示切替に対応。
  metric_overlay:
    show_overlay: true            # 全体 on/off。false で全 overlay 非表示
    initially_shown: null         # 初期表示するキーのリスト（null=全表示）
                                  # 使えるキー: 'haze', 'gloss_20', 'gloss_60', 'gloss_85',
                                  #   'doi_nser', 'doi_comb', 'doi_astm'
    click_policy: 'hide'          # 凡例クリック動作 'hide' / 'mute' / 'none'
    legend_position: 'right'      # 凡例位置 'right' / 'top_right' / 'bottom' 等

  # BSDF 1D プロットの副軸（上段 X 軸）ユニット
  # dashboard の初期値、visualize レポート HTML の既定値、simulate の
  # bsdf_report.html 生成に使用される（CLI --secondary-x-unit で上書き可能）
  # 有効値: 'lambda_scale' / 'u' / 'f' / 'k_x' / 'theta_s'(副軸なし)
  #   lambda_scale: 構造スケール Λ=λ/sin θ_s [μm]（AG凹凸ピッチ、既定）
  #   u:            方向余弦 sin θ_s（FFT 自然座標）
  #   f:            空間周波数 sin θ_s / λ [μm⁻¹]（PSD 横軸）
  #   k_x:          横方向波数 2π sin θ_s / λ [rad/μm]
  #   theta_s:      副軸なし
  secondary_x_unit: 'lambda_scale'

# ── Optuna 最適化 ─────────────────────────────────────────────────────────────
optuna:
  n_trials: 200
  n_jobs: 1                     # 並列試行数（>1 で並列実行）
  sampler: 'MOTPE'              # 'MOTPE'（多目的）/ 'TPE'（単目的）
  objectives:
    - metric: 'haze_fft_0_t'           # 最小化目標1: FFT法ヘイズ (θ_i=0, BTDF)
      direction: 'minimize'
    - metric: 'sparkle_l1_fft_555_0_t' # 最小化目標2: FFT法ギラツキ (L1, 555nm, θ_i=0, BTDF)
      direction: 'minimize'
    # PSD法の指標を使う例（指定するとPSD計算が自動で追加される）:
    # - metric: 'haze_psd_0_t'
    #   direction: 'minimize'
    # 光学指標の例（新命名: <name>_<method>_<deg>_<mode>）:
    # - metric: 'gloss_fft_60_r'      # 60° 光沢
    #   direction: 'maximize'
    # - metric: 'doi_nser_fft_0_t'    # NSER (独自)
    #   direction: 'maximize'
    # - metric: 'doi_comb_fft_0_t'    # くしば (JIS K 7374) 透過
    #   direction: 'maximize'
    # - metric: 'doi_astm_fft_20_r'   # ASTM E430 Dorigon 20°
    #   direction: 'maximize'
    # 表面形状指標の例（BSDFと独立して追加可能）:
    # - metric: 'sq_um'
    #   direction: 'minimize'
  duplicate_skip:
    enabled: true
    distance_threshold: 0.01    # 正規化ユークリッド距離閾値

# ── MLflow 管理 ───────────────────────────────────────────────────────────────
# simulate --log-to-mlflow / optimize 時に 01_BSDF_Raw_Data 実験に記録される。
# run の params は本 config から自動構築される（新規 key の追加不要）:
#   形状識別: surface_design / surface_measured / bsdf_measured （短縮名）
#   ファイルパス: shape_data_path / bsdf_data_path （該当時のみ）
#   形状パラメータ: rq_um / lc_um / fractal_dim / radius_um / pitch_um / ...
#   sim 条件: wavelength_um / theta_i_deg / phi_i_deg / mode / polarization /
#            n1 / n2 （多条件は JSON 文字列、単条件はスカラ）
#   sim 専用: fft_mode / apply_fresnel
# 仕様: spec_main.md Section 6.2 の「params 仕様」表を参照。
mlflow:
  tracking_uri: 'mlruns'        # MLflowトラッキングサーバーのURI（ローカル or リモート）
  experiment_name: '01_BSDF_Raw_Data'

# ── DynamicMap プレビュー ─────────────────────────────────────────────────────
dynamicmap:
  preview_grid_size_drag: 128   # ドラッグ中の解像度
  preview_grid_size_idle: 512   # ドラッグ停止後の解像度
  cache_size: 256               # LRUキャッシュのエントリ数
  random_seed: 42               # プレビュー用乱数シード（固定）
  default_preview_mode: 'reduced_area'  # 'reduced_area' / 'reduced_resolution'
