# 装置XYZ フォーマット使用時の config.yaml サンプル
#
# custom_surfaces/device_xyz.py のローダー実装例に対応する最小 config。
# sample_inputs/device_xyz_sample.csv を入力形状として使用する。
#
# ── CLI 使用例 ──────────────────────────────────────────────────────────────
#
# (1) FFT で simulate（Parquet 出力のみ）
#     bsdf simulate --config sample_inputs/config_device_xyz.yaml -m fft
#
# (2) MLflow に記録（surface.png / bsdf_2d_*.png / bsdf_report.html が artifacts に）
#     bsdf simulate --config sample_inputs/config_device_xyz.yaml \
#                   -m fft --log-to-mlflow
#
# (3) 表面形状の確認
#     bsdf surface --config sample_inputs/config_device_xyz.yaml \
#                  --format png -o xyz_surface.png --unit nm
#
# (4) dashboard で形状を表示（実測形状系なのでスライダーは無し）
#     bsdf dashboard --config sample_inputs/config_device_xyz.yaml

simulation:
  wavelength_um: 0.55
  theta_i_deg: 0.0
  phi_i_deg: 0.0
  n1: 1.0
  n2: 1.5
  polarization: 'Unpolarized'

surface:
  model: 'DeviceXyzSurface'     # custom_surfaces/device_xyz.py から自動ロード
  grid_size: 512                # サンプルは 100×100 なので小さめに設定
  pixel_size_um: 0.25
  measured:
    path: 'sample_inputs/device_xyz_sample.csv'
    source_pixel_size_um: 0.5   # 計測ピクセルサイズ [μm]
    leveling: true

bsdf_floor: 1.0e-6

metrics:
  haze:
    enabled: true
    cone_half_angle_deg: 2.5
  gloss:
    enabled: true
    specular_half_angle_deg: 2.5
  doi_nser:
    enabled: false
  doi_comb:
    enabled: false
  doi_astm:
    enabled: false
  sparkle:
    enabled: false
